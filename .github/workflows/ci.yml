name: CI Pipeline

# Este pipeline se ejecuta automáticamente cuando hago push
# o cuando se crea un pull request hacia la rama main.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    # Trabajo dentro de la carpeta backend porque ahí está la API.
    defaults:
      run:
        working-directory: backend

    steps:
      # Primero clono el repositorio para que GitHub Actions tenga acceso al código.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configuro Node.js para poder instalar dependencias y ejecutar pruebas.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Instalo las dependencias del backend usando npm ci,
      # que es más recomendado para ambientes de integración continua.
      - name: Install backend dependencies
        run: npm ci

      # Ejecuto las pruebas del backend para validar que la API no tenga errores.
      - name: Run backend tests
        run: npm test

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    # Trabajo dentro de la carpeta frontend porque ahí está la aplicación React.
    defaults:
      run:
        working-directory: frontend

    steps:
      # Clono el repositorio para tener disponible el código del frontend.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configuro Node.js para poder instalar dependencias y compilar el proyecto.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Instalo las dependencias del frontend.
      - name: Install frontend dependencies
        run: npm ci

      # Compilo el frontend para validar que la aplicación se pueda construir correctamente.
      - name: Build frontend
        run: npm run build

